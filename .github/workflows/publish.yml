name: Publish to DigitalOcean Container Registry - Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    env:
      REGISTRY: registry.digitalocean.com/ayd2-p2
      IMAGE_TAG: ${{ github.sha }}

    steps:
      # ── Checkout ─────────────────────────────────────

      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Java ──────────────────────────────────

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # ── Build JARs ──────────────────────────────────

      - name: Build JAR — api_gateway
        working-directory: api_gateway
        run: |
          chmod +x gradlew
          ./gradlew bootJar --no-daemon -x test

      - name: Build JAR — discovery_service
        working-directory: discovery_service
        run: |
          chmod +x gradlew
          ./gradlew bootJar --no-daemon -x test

      # ── Install DigitalOcean CLI ───────────────────

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      # ── Build Docker Images ────────────────────────

      - name: Build Docker image — api_gateway
        run: |
          SHORT_SHA=$(echo $IMAGE_TAG | head -c7)

          docker build \
            -t $REGISTRY/api_gateway:$SHORT_SHA \
            -t $REGISTRY/api_gateway:latest \
            ./api_gateway

      - name: Build Docker image — discovery_service
        run: |
          SHORT_SHA=$(echo $IMAGE_TAG | head -c7)

          docker build \
            -t $REGISTRY/discovery_service:$SHORT_SHA \
            -t $REGISTRY/discovery_service:latest \
            ./discovery_service

      # ── Login to DigitalOcean Registry ─────────────

      - name: Login to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      # ── Push Images ────────────────────────────────

      - name: Push Docker image — api_gateway
        run: |
          SHORT_SHA=$(echo $IMAGE_TAG | head -c7)

          docker push $REGISTRY/api_gateway:$SHORT_SHA
          docker push $REGISTRY/api_gateway:latest

      - name: Push Docker image — discovery_service
        run: |
          SHORT_SHA=$(echo $IMAGE_TAG | head -c7)

          docker push $REGISTRY/discovery_service:$SHORT_SHA
          docker push $REGISTRY/discovery_service:latest