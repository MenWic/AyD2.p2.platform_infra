name: Run tests and build JAR on Pull Request - Test & Build

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-api-gateway:
    name: Build api_gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api_gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon -x test

  build-discovery-service:
    name: Build discovery_service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: discovery_service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon -x test
