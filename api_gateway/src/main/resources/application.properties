spring.application.name=api-gateway

server.port=8080

# Eureka Client
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=when_authorized

# Gateway routes - Conference Service user-scoped sub-resources (MUST be before IAM /users/** catch-all)
spring.cloud.gateway.server.webmvc.routes[0].id=conference-user-scoped-route
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://conference-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v1/users/*/proposals,/api/v1/users/*/enrollments,/api/v1/users/*/reservations,/api/v1/users/*/diplomas
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=2

# Gateway routes - IAM Auth
spring.cloud.gateway.server.webmvc.routes[1].id=iam-auth-route
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://iam-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=2

# Gateway routes - IAM Users (catch-all for user management)
spring.cloud.gateway.server.webmvc.routes[2].id=iam-users-route
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://iam-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/v1/users/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=StripPrefix=2

